name: Prefrontal CI (Stable + Cross Platform)
on:
  push:
    branches: [main]
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      # =========================
      # CHECKOUT + NODE
      # =========================
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      # =========================
      # OLLAMA INSTALL (OS SAFE)
      # =========================
      - name: Install Ollama (Linux)
        if: runner.os == 'Linux'
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Install Ollama (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: irm https://ollama.com/install.ps1 | iex
      - name: Install Ollama (macOS, CLI only via Homebrew)
        if: runner.os == 'macOS'
        run: |
          # The official install.sh script on macOS pulls down the full
          # Ollama.app (menu-bar GUI app). On a headless CI runner there is
          # no GUI session, so anything that tries to launch the .app hangs
          # or fails. Homebrew's formula installs just the CLI binary, which
          # is all `ollama serve` needs.
          brew install ollama
      - name: Add Ollama to PATH (Windows fix)
        if: runner.os == 'Windows'
        shell: powershell
        run: echo "$env:LOCALAPPDATA\Programs\Ollama" >> $env:GITHUB_PATH
      # =========================
      # RUN CI PIPELINE (SAFE)
      # =========================
      - name: Run CI tests
        run: node tests/run-ci.js
        timeout-minutes: 35
