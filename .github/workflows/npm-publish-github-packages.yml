# This workflow runs automatically on every push and pull request, 
# and safely publishes the package only when a release is created.

name: Node.js Package

on:
  push:
    branches: [ main ]         
  pull_request:
    branches: [ main ]         
  release:
    types: [created]           

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install       

  publish-gpr:
    needs: build
    if: github.event_name == 'release' 
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/
      - run: npm install       
      - run: npm publish --registry=https://npm.pkg.github.com  # Fixed: Hardcodes the correct registry destination
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
