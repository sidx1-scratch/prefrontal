# This workflow runs tests on every push and pull request automatically, 
# and safely publishes the package only when a release is created.

name: Node.js Package

on:
  push:
    branches: [ main ]         # Runs tests automatically on push to main
  pull_request:
    branches: [ main ]         # Runs tests automatically on PRs to main
  release:
    types: [created]           # Runs tests and publishes on a new release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install       # Fixed: Uses install to avoid package-lock errors
      - run: npm test

  publish-gpr:
    needs: build
    # Safeguard: This job only runs if the triggering event was an actual release
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # Grants GITHUB_TOKEN permission to upload packages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://github.com
      - run: npm install       # Fixed: Uses install to avoid package-lock errors
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
