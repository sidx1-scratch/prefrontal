name: Prefrontal CI (Stable + Cross Platform)
on:
  push:
    branches: [main]
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      # =========================
      # CHECKOUT + NODE
      # =========================
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      # =========================
      # OLLAMA INSTALL (OS SAFE)
      # =========================
      - name: Install Ollama (Linux)
        if: runner.os == 'Linux'
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Install Ollama (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: irm https://ollama.com/install.ps1 | iex
      - name: Install Ollama (macOS, official CLI tarball)
        if: runner.os == 'macOS'
        run: |
          # The install.sh script pulls the full Ollama.app GUI, which hangs
          # on a headless runner. Homebrew's formula is CLI-only but is
          # missing the bundled llama-server runner binaries (known Homebrew
          # packaging gap), causing "llama-server binary not found" at
          # generate time. The official GitHub release tarball is CLI-only
          # AND includes the runners — but it uses GNU tar's sparse-file
          # format for the binary, and macOS's built-in `tar` (bsdtar) mis-
          # extracts that into a GNUSparseFile.0/ subfolder instead of
          # bin/ollama (see ollama/ollama#11262). Use GNU tar to extract
          # correctly.
          brew install gnu-tar
          curl -fsSL -o ollama-darwin.tgz https://github.com/ollama/ollama/releases/latest/download/ollama-darwin.tgz
          sudo gtar -C /usr/local -xzf ollama-darwin.tgz
          rm ollama-darwin.tgz
          ollama --version
      - name: Add Ollama to PATH (Windows fix)
        if: runner.os == 'Windows'
        shell: powershell
        run: echo "$env:LOCALAPPDATA\Programs\Ollama" >> $env:GITHUB_PATH
      # =========================
      # RUN CI PIPELINE (SAFE)
      # =========================
      - name: Run CI tests
        run: node tests/run-ci.js
        timeout-minutes: 35
