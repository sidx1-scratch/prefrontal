name: Prefrontal CI (Stable + Cross Platform)
on:
  push:
    branches: [main]
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      # =========================
      # CHECKOUT + NODE
      # =========================
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      # =========================
      # OLLAMA INSTALL (AUTOMATED)
      # =========================
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v1

      # =========================
      # RUN CI PIPELINE (SAFE)
      # =========================
      - name: Run CI tests
        run: node tests/run-ci.js
        timeout-minutes: 35
