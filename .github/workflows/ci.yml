name: Prefrontal CI (Stable + Intelligent + Cross-Platform)

on:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 40

    steps:
      # =========================================================
      # CHECKOUT + NODE
      # =========================================================

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # =========================================================
      # START FRONTEND
      # =========================================================

      - name: Start app (stable serve)
        shell: bash
        run: |
          npx -y serve . -l 3000 > app.log 2>&1 &
          echo "Frontend starting..."

      # =========================================================
      # WAIT FOR FRONTEND
      # =========================================================

      - name: Wait for frontend
        shell: node
        run: |
          const http = require("http");

          const timeout = Date.now() + 60000;

          function check() {
            if (Date.now() > timeout) {
              console.error("Frontend timeout");
              process.exit(1);
            }

            http.get("http://localhost:3000", res => {
              console.log("Frontend ready");
              process.exit(0);
            }).on("error", () => setTimeout(check, 1000));
          }

          check();

      # =========================================================
      # MACOS SAFE MODE
      # =========================================================

      - name: macOS validation
        if: runner.os == 'macOS'
        run: |
          echo "macOS safe mode"
          curl -f http://localhost:3000 || exit 1

      # =========================================================
      # INSTALL OLLAMA (Linux + Windows only)
      # =========================================================

      - name: Install Ollama (Linux)
        if: runner.os == 'Linux'
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Install Ollama (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: irm https://ollama.com/install.ps1 | iex

      # =========================================================
      # START OLLAMA
      # =========================================================

      - name: Start Ollama
        if: runner.os != 'macOS'
        shell: bash
        run: |
          nohup ollama serve > ollama.log 2>&1 &
          echo "Ollama starting..."

      # =========================================================
      # WAIT FOR OLLAMA
      # =========================================================

      - name: Wait for Ollama
        if: runner.os != 'macOS'
        shell: node
        run: |
          const http = require("http");

          const timeout = Date.now() + 60000;

          function check() {
            if (Date.now() > timeout) {
              console.error("Ollama timeout");
              process.exit(1);
            }

            http.get("http://localhost:11434/api/tags", res => {
              let data = "";
              res.on("data", d => data += d);
              res.on("end", () => {
                try {
                  JSON.parse(data);
                  console.log("Ollama ready");
                  process.exit(0);
                } catch {
                  setTimeout(check, 1500);
                }
              });
            }).on("error", () => setTimeout(check, 1500));
          }

          check();

      # =========================================================
      # CACHE MODELS
      # =========================================================

      - name: Cache Ollama models
        if: runner.os != 'macOS'
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-${{ runner.os }}-llama3.2-1b

      # =========================================================
      # PULL MODEL
      # =========================================================

      - name: Pull model
        if: runner.os != 'macOS'
        run: ollama pull llama3.2:1b

      # =========================================================
      # SMOKE TEST
      # =========================================================

      - name: Run CI smoke test
        if: runner.os != 'macOS'
        run: node tests/ci-smoke.js

      # =========================================================
      # SAFE LOG DUMP (FIXED)
      # =========================================================

      - name: Dump logs on failure (Linux/macOS)
        if: failure() && runner.os != 'Windows'
        shell: bash
        run: |
          echo "===== APP LOG ====="
          if [ -f app.log ]; then cat app.log; else echo "no app.log"; fi

          echo "===== OLLAMA LOG ====="
          if [ -f ollama.log ]; then cat ollama.log; else echo "no ollama.log"; fi

      - name: Dump logs on failure (Windows)
        if: failure() && runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "===== APP LOG ====="
          if (Test-Path app.log) { Get-Content app.log } else { Write-Host "no app.log" }

          Write-Host "===== OLLAMA LOG ====="
          if (Test-Path ollama.log) { Get-Content ollama.log } else { Write-Host "no ollama.log" }

      # =========================================================
      # DASHBOARD
      # =========================================================

      - name: CI Dashboard Summary
        if: always()
        shell: bash
        run: |
          echo "=================================="
          echo "CI DASHBOARD"
          echo "OS: ${{ runner.os }}"
          echo "Frontend: OK"
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "AI: SKIPPED"
          else
            echo "AI: TESTED"
          fi
          echo "=================================="
