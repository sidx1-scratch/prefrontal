name: Prefrontal CI (Stable)

on:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # =========================
      # OLLAMA INSTALL (FIXED PER OS)
      # =========================

      - name: Install Ollama (Linux)
        if: runner.os == 'Linux'
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Install Ollama (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: irm https://ollama.com/install.ps1 | iex

      - name: Install Ollama (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh || echo "macOS Ollama install may be unstable"

      - name: Add Ollama PATH (Windows fix)
        if: runner.os == 'Windows'
        shell: powershell
        run: echo "$env:LOCALAPPDATA\Programs\Ollama" >> $env:GITHUB_PATH

      # =========================
      # IMPORTANT: PREVENT HANGING
      # =========================

      - name: Start CI with timeout guard
        run: |
          timeout 30m node tests/run-ci.js
