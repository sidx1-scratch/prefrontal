name: Auto Release + GitHub Packages

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # AUTO VERSION BUMP (fixes 1.0.8 repeat issue forever)
      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npm version patch -m "auto version bump %s"

      # PUSH VERSION BACK TO REPO
      - name: Push version bump
        run: |
          git push origin main --follow-tags

      # READ VERSION (FIXED — no broken escaping)
      - name: Read version
        id: version
        run: |
          ver=$(node -p "require('./package.json').version")
          echo "ver=$ver" >> $GITHUB_OUTPUT

      # CREATE GITHUB RELEASE AUTOMATICALLY
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.ver }}
          name: v${{ steps.version.outputs.ver }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # PUBLISH TO GITHUB PACKAGES
      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
