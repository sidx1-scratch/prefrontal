name: Prefrontal CI (Stable + macOS Fixed)

on:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # =========================================================
      # OLLAMA INSTALL (ALL OS FIXED)
      # =========================================================

      - name: Install Ollama (Linux)
        if: runner.os == 'Linux'
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Install Ollama (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ollama
          ollama --version

      - name: Install Ollama (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: irm https://ollama.com/install.ps1 | iex

      - name: Fix Windows PATH
        if: runner.os == 'Windows'
        shell: powershell
        run: echo "$env:LOCALAPPDATA\Programs\Ollama" >> $env:GITHUB_PATH

      # =========================================================
      # START OLLAMA (MAC SAFE START)
      # =========================================================

      - name: Start Ollama
        shell: bash
        run: |
          nohup ollama serve > ollama.log 2>&1 &

      # =========================================================
      # WAIT FOR API (NO RACE CONDITIONS)
      # =========================================================

      - name: Wait for Ollama API
        shell: bash
        run: |
          node -e "
          const http=require('http');

          function check(){
            http.get('http://localhost:11434/api/tags',res=>{
              let d='';
              res.on('data',x=>d+=x);
              res.on('end',()=>{
                try{
                  JSON.parse(d);
                  process.exit(0);
                }catch(e){
                  setTimeout(check,1500);
                }
              });
            }).on('error',()=>setTimeout(check,1500));
          }

          check();
          "
      
      # =========================================================
      # CRITICAL FIX: MACOS COLD START
      # =========================================================

      - name: Warm up model (fix empty response bug)
        run: ollama run llama3.2:1b "warmup"

      - name: Pull model
        run: ollama pull llama3.2:1b

      # =========================================================
      # START APP
      # =========================================================

      - name: Start app
        run: npm start &

      - name: Wait for frontend
        run: |
          node -e "
          const http=require('http');

          function check(){
            http.get('http://localhost:3000',res=>process.exit(0))
              .on('error',()=>setTimeout(check,1000));
          }

          check();
          "

      # =========================================================
      # RUN SMOKE TEST
      # =========================================================

      - name: Run CI smoke test
        run: node tests/ci-smoke.js
