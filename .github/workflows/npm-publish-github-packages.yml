# This workflow runs automatically on every push and pull request, 
# and safely publishes the package only when a release is created.

name: Node.js Package

on:
  push:
    branches: [ main ]         # Automatically runs checks on standard pushes
  pull_request:
    branches: [ main ]         # Automatically runs checks on pull requests
  release:
    types: [created]           # Automatically triggers the publication on a new release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install       # Installs your project dependencies automatically

  publish-gpr:
    needs: build
    if: github.event_name == 'release' # Security gate: only publishes when you make a release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # Grants GITHUB_TOKEN the power to upload packages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://github.com
      - run: npm install       
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
